name: Aperture context bundle on PR

# Drop this into .github/workflows/aperture-context.yml
# On each PR, generates a cited context bundle for changed files
# and posts it as a comment — gives your code-review bot scoped context.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  aperture-bundle:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Index repository
        run: npx -y aperture index .

      - name: Get PR description
        id: pr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          TASK="${PR_TITLE}: ${PR_BODY}"
          echo "task=${TASK}" >> $GITHUB_OUTPUT

      - name: Build context bundle
        id: bundle
        run: |
          BUNDLE=$(npx aperture focus "${{ steps.pr.outputs.task }}" --budget 6000 --format json)
          echo "bundle<<EOF" >> $GITHUB_OUTPUT
          echo "$BUNDLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Format bundle as markdown
        id: markdown
        run: |
          MARKDOWN=$(npx aperture focus "${{ steps.pr.outputs.task }}" --budget 6000 --format markdown)
          echo "markdown<<EOF" >> $GITHUB_OUTPUT
          echo "$MARKDOWN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post bundle as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const markdown = `${{ steps.markdown.outputs.markdown }}`;
            const bundle = JSON.parse(`${{ steps.bundle.outputs.bundle }}`);
            const summary = bundle.files
              .map(f => `- \`${f.path}\` — score=${f.score.toFixed(3)}, ${f.tokens} tok`)
              .join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Aperture context bundle',
                '',
                `**Task:** ${bundle.task}`,
                `**Tokens:** ${bundle.tokens}/${bundle.budget} · **Files:** ${bundle.files.length}`,
                '',
                '### Selected files',
                summary,
                '',
                '<details><summary>Full bundle (markdown)</summary>',
                '',
                markdown,
                '',
                '</details>',
                '',
                '*Generated by [Aperture](https://github.com/kioie/aperture) — budget-aware code context bundles*'
              ].join('\n')
            });
