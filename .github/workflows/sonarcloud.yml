# CI SonarCloud scan — uses sonar-project.properties.
# Requires: import kioie/aperture at sonarcloud.io, then add repo secret SONAR_TOKEN.
name: SonarCloud

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: sonar-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - id: sonar
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN not set — skipping upload. Import the repo at sonarcloud.io and add SONAR_TOKEN."
          fi

      - run: npm ci
        if: steps.sonar.outputs.enabled == 'true'

      - run: npm run build
        if: steps.sonar.outputs.enabled == 'true'

      - run: npm run test:coverage
        if: steps.sonar.outputs.enabled == 'true'

      - name: SonarCloud Scan
        if: steps.sonar.outputs.enabled == 'true'
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sonar skipped (no token)
        if: steps.sonar.outputs.enabled != 'true'
        run: echo "SonarCloud workflow skipped — configure SONAR_TOKEN after importing project on SonarCloud."
